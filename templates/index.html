{% extends 'base.html' %}

{% block content %}

<div class="hero">
    <h1>
        Finance Dashboard
    </h1>
    <h2>
        Upload you bankstatement and site will update the dashboard
    </h2>
    <form method="POST" enctype="multipart/form-data" >
    <div class="file-upload"> 
        <label>Select your Statement</label>
        <input type="file" name="statement" accept= ".xls,.xlsx,.csv,.pdf">
        <button type="submit" class= "btn-primary">Submit Statement</button>
    </div> 
</form>
</div>
{% endblock %}
